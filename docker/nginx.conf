server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── API + OAuth → ASP.NET Core backend ────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE: disable buffering so stream frames reach the browser immediately
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        # Tool invocations and LLM streaming can take several minutes
        proxy_read_timeout    300s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    300s;
    }

    location /oauth/ {
        proxy_pass         http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static assets: long-lived cache (content-hashed filenames) ────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback: all other routes → index.html ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
