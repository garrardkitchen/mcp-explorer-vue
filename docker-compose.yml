name: mcp-explorer

# ─── Separate-services deployment ─────────────────────────────────────────────
# Usage:
#   cp .env.example .env        # fill in your values
#   docker compose up -d
#
# Single-container alternative:
#   docker build -t mcp-explorer .
#   docker run -p 8080:8080 -v mcp-data:/root/.local/share/McpExplorer mcp-explorer
# ──────────────────────────────────────────────────────────────────────────────

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - AppMetadata__Version=${AppMetadata__Version:-0.5.0}
      - LlmService__OpenAiBaseUrl=${LlmService__OpenAiBaseUrl:-https://api.openai.com/v1}
      - LlmService__MaxRetryAttempts=${LlmService__MaxRetryAttempts:-3}
      - LlmService__TimeoutSeconds=${LlmService__TimeoutSeconds:-30}
      - ToolInvoke__TimeoutSeconds=${ToolInvoke__TimeoutSeconds:-300}
      - ToolInvoke__MaxRetryAttempts=${ToolInvoke__MaxRetryAttempts:-2}
      - Elicitation__TimeoutSeconds=${Elicitation__TimeoutSeconds:-0}
      # Override the client name sent to MCP servers (User-Agent + handshake).
      # Defaults to "mcp-explorer" if not set.
      - MCP_CLIENT_NAME=${MCP_CLIENT_NAME:-mcp-explorer}
      # Point to an existing settings.json (e.g. from the original MCP Explorer)
      # Leave empty to use the default path inside the container (/data/settings.json)
      - PREFERENCES__StoragePath=${PREFERENCES__StoragePath:-/data/settings.json}
      # Always tell az CLI (and Azure SDK) to look in /root/.azure inside the container.
      # The host directory is mounted there via the HOST_AZURE_CONFIG_DIR volume below.
      - AZURE_CONFIG_DIR=/root/.azure
    volumes:
      # Mount host settings directory into the container.
      # Set MCP_DATA_PATH in .env to your existing settings folder, e.g.:
      #   MCP_DATA_PATH=/Users/you/Library/Application Support/McpExplorer
      - ${MCP_DATA_PATH:-mcp-data}:/data
      # Persist the `devtunnel` CLI login token across container restarts.
      # The devtunnel CLI stores its credentials at /root/.local/share/DevTunnels
      # (NOT /root/.devtunnels — that directory is only used for legacy configs).
      # Without this volume, you would have to re-run device-code login every time
      # `docker compose down -v` is executed.
      #
      # If HOST_DEVTUNNELS_DIR is set in .env (e.g. HOST_DEVTUNNELS_DIR=/Users/you/.local/share/DevTunnels),
      # the container will reuse your existing host login and you'll skip the device-code
      # step entirely. Otherwise the named `devtunnels-cli` volume is used.
      - ${HOST_DEVTUNNELS_DIR:-devtunnels-cli}:/root/.local/share/DevTunnels
      # Optional: mount the host ~/.azure directory so AzureCliCredential can use
      # your existing `az login` session for Key Vault / app-registration lookups.
      # Set HOST_AZURE_CONFIG_DIR in .env to your host ~/.azure path to enable.
      # Leave empty (default) to skip the mount — Azure features will be unavailable.
      # NOTE: Must be rw (not ro) so az can write back refreshed tokens to the cache.
      - ${HOST_AZURE_CONFIG_DIR:-azure-config-empty}:/root/.azure
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8090}:8080"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

volumes:
  # Only used when MCP_DATA_PATH is not set in .env (anonymous fallback volume)
  mcp-data:
    driver: local
  # Persists `devtunnel user login` state across container restarts.
  devtunnels-cli:
    driver: local
  # Empty placeholder used when AZURE_CONFIG_DIR is not set.
  # When AZURE_CONFIG_DIR is set to a host path, this volume is never used.
  azure-config-empty:
    driver: local

networks:
  internal:
    driver: bridge
